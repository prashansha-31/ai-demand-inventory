<!DOCTYPE html>
<html>
<head>
    <title>Inventory Optimization</title>
    <style>
        body { font-family: Arial; padding: 40px; }
        input { padding: 8px; margin: 5px; width: 200px; }
        button { padding: 8px 15px; }
        .card {
            margin-top: 20px;
            padding: 20px;
            background-color: #e3f2fd;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h2>Inventory Optimization</h2>

<form method="POST">
    <input type="number" name="store" placeholder="Store ID" required>
    <input type="number" name="dept" placeholder="Department ID" required>
    <input type="number" step="0.01" name="demand" placeholder="Predicted Weekly Demand" required>
    <br>
    <button type="submit">Calculate Inventory Policy</button>
</form>

{% if result %}
<div class="card">
    <h3>Recommended Inventory Policy</h3>
    <p><strong>Store:</strong> {{ result.store }}</p>
    <p><strong>Department:</strong> {{ result.dept }}</p>
    <p><strong>EOQ:</strong> {{ result.eoq }}</p>
    <p><strong>Safety Stock:</strong> {{ result.safety_stock }}</p>
    <p><strong>Reorder Point:</strong> {{ result.reorder_point }}</p>
</div>
{% endif %}

</body>
</html>
