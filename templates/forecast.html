<!DOCTYPE html>
<html>
<head>
    <title>Demand Forecast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Demand Forecasting</h2>

    <form method="POST">
        <div class="row mb-3">
            <div class="col">
                <input type="number" name="store"
       class="form-control"
       placeholder="Store ID"
       value="{{ selected_store or '' }}"
       required>
            </div>
            <div class="col">
                <input type="number" name="dept"
       class="form-control"
       placeholder="Department ID"
       value="{{ selected_dept or '' }}"
       required>
            </div>
        </div>

        <button type="submit" class="btn btn-dark">Predict Demand</button>
    </form>

    {% if prediction %}
<div class="alert alert-success mt-4">
    <h5>Prediction Result</h5>
    <p>
        Store ID: <strong>{{ selected_store }}</strong> |
        Department ID: <strong>{{ selected_dept }}</strong>
    </p>
    <p>
        Predicted Weekly Sales:
        <strong>{{ prediction | round(2) }}</strong>
    </p>
</div>
{% endif %}

</div>

</body>
</html>
